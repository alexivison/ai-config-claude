<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="JetBrains Mono, monospace" font-size="11">
  <rect width="900" height="520" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="450" y="28" fill="#e0e0e0" font-size="16" font-weight="bold" text-anchor="middle">tmux Status Bar: Hidden-Window Architecture</text>

  <!-- Concept overview -->
  <rect x="30" y="48" width="840" height="48" fill="#12121f" stroke="#444" stroke-width="1" rx="4"/>
  <text x="40" y="66" fill="#ffcc80" font-size="10" font-weight="bold">Design principle:</text>
  <text x="185" y="66" fill="#78909c" font-size="10">Agent windows (hidden) are dimmed; workspace windows (user-facing) are bright.</text>
  <text x="40" y="82" fill="#78909c" font-size="10">The status bar visually separates infrastructure from workspace, so agent windows stay out of the way.</text>

  <!-- Status bar full example -->
  <text x="30" y="125" fill="#4a9eff" font-weight="bold" font-size="13">Status Bar Layout</text>

  <!-- Full-width status bar background -->
  <rect x="30" y="138" width="840" height="44" fill="#0d1117" stroke="#30363d" stroke-width="2" rx="4"/>

  <!-- Left zone: Agent windows (dimmed) -->
  <rect x="32" y="140" width="200" height="40" fill="#0a0e14" rx="3"/>
  <text x="42" y="155" fill="#555" font-size="9">AGENT WINDOWS</text>
  <text x="48" y="172" fill="#444" font-size="12">0:codex</text>

  <!-- Separator -->
  <line x1="237" y1="143" x2="237" y2="175" stroke="#7c4dff" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="241" y="164" fill="#7c4dff" font-size="14">|</text>

  <!-- Right zone: Workspace windows (bright) -->
  <rect x="255" y="140" width="610" height="40" fill="#111822" rx="3"/>
  <text x="265" y="155" fill="#4a9eff" font-size="9">WORKSPACE WINDOWS</text>
  <text x="271" y="172" fill="#e0e0e0" font-size="12" font-weight="bold">1:party*</text>
  <text x="390" y="172" fill="#b0bec5" font-size="12">2:shell</text>
  <text x="490" y="172" fill="#b0bec5" font-size="12">3:logs</text>

  <!-- Annotated breakdown -->
  <text x="30" y="215" fill="#4a9eff" font-weight="bold" font-size="13">Zone Breakdown</text>

  <!-- Agent zone detail -->
  <rect x="30" y="230" width="400" height="130" fill="#0d1117" stroke="#30363d" stroke-width="1" rx="4"/>
  <text x="40" y="252" fill="#555" font-weight="bold" font-size="11">Agent Zone (left, dimmed)</text>
  <line x1="35" y1="260" x2="425" y2="260" stroke="#30363d" stroke-width="1"/>

  <text x="48" y="280" fill="#444" font-size="12">0:codex</text>
  <text x="150" y="280" fill="#555" font-size="10">-- hidden window, background</text>

  <text x="40" y="305" fill="#78909c" font-size="10">Style: fg=#444, bg=default</text>
  <text x="40" y="322" fill="#78909c" font-size="10">Purpose: Codex and future agent windows</text>
  <text x="40" y="339" fill="#78909c" font-size="10">User rarely interacts directly</text>

  <!-- Workspace zone detail -->
  <rect x="470" y="230" width="400" height="130" fill="#0d1117" stroke="#30363d" stroke-width="1" rx="4"/>
  <text x="480" y="252" fill="#4a9eff" font-weight="bold" font-size="11">Workspace Zone (right, bright)</text>
  <line x1="475" y1="260" x2="865" y2="260" stroke="#30363d" stroke-width="1"/>

  <text x="488" y="280" fill="#e0e0e0" font-size="12" font-weight="bold">1:party*</text>
  <text x="580" y="280" fill="#b0bec5" font-size="12">2:shell</text>
  <text x="660" y="280" fill="#b0bec5" font-size="12">3:logs</text>

  <text x="480" y="305" fill="#78909c" font-size="10">Style: active=bold+bright, others=normal</text>
  <text x="480" y="322" fill="#78909c" font-size="10">Window 1: party panes (TUI | Claude | Shell)</text>
  <text x="480" y="339" fill="#78909c" font-size="10">Windows 2+: user-added (shell, logs, etc.)</text>

  <!-- tmux config snippet -->
  <text x="30" y="395" fill="#4a9eff" font-weight="bold" font-size="13">tmux Configuration</text>

  <rect x="30" y="408" width="840" height="95" fill="#0d1117" stroke="#30363d" stroke-width="1" rx="4"/>
  <text x="45" y="428" fill="#78909c" font-size="10"># Agent windows: dim style (window 0)</text>
  <text x="45" y="444" fill="#4caf50" font-size="10">set-window-option -t :0 window-status-style "fg=#444444"</text>
  <text x="45" y="462" fill="#78909c" font-size="10"># Workspace windows: bright style (window 1+)</text>
  <text x="45" y="478" fill="#4caf50" font-size="10">set -g window-status-current-style "fg=#e0e0e0,bold"</text>
  <text x="45" y="494" fill="#4caf50" font-size="10">set -g window-status-style "fg=#b0bec5"</text>

  <!-- Footer notes -->
  <text x="30" y="518" fill="#78909c" font-size="10">The separator is logical (style contrast); no tmux separator character needed. Active window (*) is bold white; inactive workspace windows are light gray.</text>
</svg>
